# =============================================================================
# pytest.ini — Top-level pytest configuration
# =============================================================================
# Task 359 ROOT FIX: the CI workflow previously ran only 13 of 76 test
# files (hand-picked lists of specific test_*.py paths). The audit
# demanded `pytest tests/` (all tests) instead. To make this work
# without CI failing on slow / network-dependent tests:
#
#   * Markers: `slow` (long-running tests, only run on merge to main),
#     `network` (tests that hit live external APIs — ChEMBL, UniProt,
#     DisGeNET, PubChem, STRING, OMIM), `gpu` (CUDA-only tests).
#   * Default addopts: skip `network` + `gpu` markers in PR CI (PR runs
#     are fast — they validate code changes, not data freshness). The
#     full suite runs on `main` and on tagged releases via the
#     `ci-full` job added in .github/workflows/ci.yml.
#   * testpaths: `tests/` is the canonical top-level test directory.
#     Phase-specific tests live in `phase1/tests/` and `phase2/tests/`
#     and are picked up by the per-phase pytest invocations.
# =============================================================================
[pytest]
minversion = 7.0
testpaths =
    tests
    phase1/tests
    phase2/tests
    # v113 IN-085 ROOT FIX: removed ``phase2/drugos_graph/tests`` --
    # this directory does NOT exist (Phase 2 tests live in
    # ``phase2/tests/``, not ``phase2/drugos_graph/tests/``). The
    # previous entry caused pytest to emit a "directory not found"
    # warning on every collection, and with ``--strict-markers`` could
    # cause pytest to exit non-zero. The ``phase2/drugos_graph/
    # pyproject.toml`` has its OWN ``testpaths = ["."]`` which is used
    # when pytest is run from inside that directory -- the ROOT
    # pytest.ini should NOT duplicate that path.
addopts =
    -ra
    --strict-markers
    --tb=short
    -p no:cacheprovider
    # v113 IN-055 ROOT FIX: the previous addopts declared markers
    # (``slow``, ``network``, ``gpu``, ``integration``, ``forensic``)
    # but did NOT include a marker filter. The comment at the top of
    # this file claimed "Default addopts: skip ``network`` + ``gpu``
    # markers in PR CI" -- but the actual addopts did NOT skip them.
    # Running ``pytest tests/`` from the repo root would hit live
    # ChEMBL / UniProt / DisGeNET APIs (rate-limiting, IP bans) and
    # hang for 60s per network test before timing out. ROOT FIX: add
    # ``-m "not network and not gpu and not slow"`` to the default
    # addopts. To run the FULL suite (including network/slow/gpu
    # tests), override with:
    #     pytest --override-ini="addopts=" -m "network or slow or gpu"
    # or use the ``ci-full`` job in .github/workflows/ci.yml.
    -m "not network and not gpu and not slow"
markers =
    slow: long-running tests (gt training, rl training, full pipeline runs).
          Skipped by default in PR CI; run on merge to main via ci-full job.
    network: tests that hit live external APIs (ChEMBL, UniProt, DisGeNET,
             PubChem, STRING, OMIM). Skipped in PR CI by default.
    gpu: tests that require a CUDA GPU. Always skipped in CPU-only CI.
    integration: tests that exercise multiple phases end-to-end (Phase 1
                 → Phase 2 → Phase 3 → Phase 4). Run on merge to main.
    forensic: forensic root-cause verification tests (audit-driven).
              Always run — these guard against regression of the
              institutional-grade root fixes.
    live_api: marks tests that issue real HTTPS API calls (deselect with -m "not live_api").
    live_model: marks tests that download real model weights (deselect with -m "not live_model").
# SH-036 v117 ROOT FIX (Teammate 8): the previous filterwarnings was a
# BLANKET ignore of ALL DeprecationWarnings from rdkit, torch, and
# transformers. This masked REAL deprecation issues — when rdkit
# deprecated a function the codebase used, pytest silently suppressed
# the warning, and the codebase kept using the deprecated function
# until rdkit removed it entirely (at which point the codebase broke
# with a cryptic ImportError instead of a clear DeprecationWarning).
#
# ROOT FIX: narrow the filter to SPECIFIC known-safe deprecations.
# Each filter targets a specific message pattern from a specific module.
# New deprecation warnings (from version upgrades) are VISIBLE in test
# output, so engineers can fix them before the dependency removes the
# deprecated API.
#
# Format: action:message:category:module:lineno
# - action: ignore (suppress) or error (turn into error)
# - message: regex matched against the warning message
# - category: the warning class
# - module: regex matched against the module path
#
# When a new deprecation appears in test output:
#   1. INVESTIGATE — is the deprecation real or spurious?
#   2. If real (codebase uses a deprecated API): FIX the codebase.
#   3. If spurious (third-party lib deprecates something we don't use):
#      add a SPECIFIC filter below (not a blanket ignore).
filterwarnings =
    # rdkit deprecation: rdkit.Chem.inchi.InchiToMol is deprecated in
    # rdkit 2024.3+ but the codebase uses it (phase1/pipelines/
    # chembl_pipeline.py line 218). The replacement (rdkit.Chem.inchi.
    # InchiToMolInfo) has a different return type — the migration is
    # tracked in issue #392. Suppress the warning until the migration
    # is complete; do NOT suppress other rdkit deprecations.
    ignore:InchiToMol is deprecated:DeprecationWarning:rdkit.*
    # torch deprecation: torch.cuda.amp.autocast is deprecated in torch
    # 2.0+ in favor of torch.amp.autocast('cuda'). The codebase uses
    # the old API in graph_transformer/training/trainer.py (lines 312,
    # 547). The migration is tracked in issue #393. Suppress until done.
    ignore:torch.cuda.amp.autocast is deprecated:DeprecationWarning:torch.*
    # transformers deprecation: transformers.pipelines.fill_mask is
    # deprecated in transformers 4.30+. The codebase uses it in
    # graph_transformer/inference/embedder.py (line 89). Tracked in
    # issue #394. Suppress until done.
    ignore:.*fill_mask.*is deprecated:DeprecationWarning:transformers.*
    # All OTHER DeprecationWarnings from rdkit/torch/transformers are
    # NOT suppressed — they appear in test output as warnings, and CI
    # can be configured to fail on new warnings (pyproject.toml's
    # [tool.pytest.ini_options] filterwarnings = "error" override).
