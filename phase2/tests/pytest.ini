[pytest]
markers =
    live_api: marks tests that issue real HTTPS API calls (deselect with -m "not live_api")
    live_model: marks tests that download real model weights (deselect with -m "not live_model")
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers -p no:cacheprovider
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
