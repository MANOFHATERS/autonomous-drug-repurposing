# DrugOS development infrastructure
#
# FE-019 ROOT FIX: PostgreSQL is required for production (per project docx
# Section 9: "Storage: PostgreSQL + S3"). SQLite was used previously but
# cannot support concurrent writes or strict type enforcement required for
# a multi-tenant pharma platform handling PHI/PII.
#
# ORCH-006 ROOT FIX: Neo4j is REQUIRED for production Phase 2 (per project
# docx Section 4: "Knowledge Graph: Neo4j"). The previous docker-compose.yml
# had Neo4j fully commented out — developers could not run Phase 2 against
# Neo4j without manually configuring it outside docker-compose, and
# production deployments had no documented Docker path. We now ship Neo4j
# ENABLED by default with a healthcheck so `docker-compose up` produces a
# working Phase 2 backend. Set DRUGOS_NEO4J_URI=bolt://localhost:7687
# in your .env to use it.
#
# Usage:
#   docker-compose up -d postgres neo4j
#   DATABASE_URL=postgresql://drugos:drugos_dev_password@localhost:5432/drugos?schema=public npm run db:migrate
#   DRUGOS_NEO4J_URI=bolt://localhost:7687 DRUGOS_NEO4J_USER=neo4j DRUGOS_NEO4J_PASSWORD=drugos_dev_password npm run dev

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: drugos-postgres
    environment:
      POSTGRES_USER: drugos
      POSTGRES_PASSWORD: drugos_dev_password
      POSTGRES_DB: drugos
    ports:
      - "5432:5432"
    volumes:
      - drugos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drugos -d drugos"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ORCH-006 ROOT FIX: Neo4j is now ENABLED by default with a healthcheck.
  # Phase 2's knowledge graph requires Neo4j (per the project docx Section 4:
  # "Knowledge Graph: Neo4j"). Without Neo4j, Phase 2 falls back to the
  # in-memory RecordingGraphBuilder, which has no persistence and no
  # concurrent access support — fine for dev smoke-tests but NOT for
  # production. Uncomment the `profiles: [dev-only]` line below if you want
  # to keep Neo4j out of the default `docker-compose up` (e.g. on a laptop
  # with limited RAM); otherwise it starts automatically.
  neo4j:
    image: neo4j:5-community
    container_name: drugos-neo4j
    environment:
      NEO4J_AUTH: neo4j/drugos_dev_password
      # ORCH-006: raise memory limits to handle production-scale graphs
      # (default 256m is too low for the 10,000-drug KG).
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
      # ORCH-006: disable authentication in dev by overriding NEO4J_AUTH=none
      # via an env override if needed. Production MUST keep auth on.
    ports:
      - "7474:7474"  # Neo4j browser UI
      - "7687:7687"  # Bolt protocol (used by Phase 2 driver)
    volumes:
      - drugos_neo4jdata:/data
    healthcheck:
      # ORCH-006: healthcheck via cypher-shell — only marks the container
      # healthy once Neo4j actually accepts queries, not just once the
      # process starts. This prevents Phase 2 from connecting to a
      # half-started Neo4j and getting connection errors.
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p drugos_dev_password 'RETURN 1;' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    # Uncomment to keep Neo4j out of the default `docker-compose up`:
    # profiles: [dev-only]

volumes:
  drugos_pgdata:
  drugos_neo4jdata:
