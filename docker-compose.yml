# =============================================================================
# Autonomous Drug Repurposing Platform — docker-compose.yml (V1 production)
# =============================================================================
# v116 ROOT FIX (Teammate 15 — Infrastructure): forensic root-level fix of all
# 38 assigned issues (6 CRITICAL, 11 HIGH, 10 MEDIUM, 11 LOW).
#
# Issues fixed in THIS file:
#   IN-001/BE-004/P1-001 (CRITICAL): every hardcoded secret replaced with
#       ${VAR:?ERROR} — compose fails fast if any secret is unset.
#   IN-002 (HIGH): three segmented networks (edge / app / data). data is
#       internal:true (no outbound internet). frontend is the ONLY edge service.
#   IN-003 (HIGH): removed host port bindings on postgres, neo4j, mlflow,
#       airflow, phase1-service, phase2, phase3, phase4. Only frontend:3000
#       (and optionally grafana:3001) are host-exposed.
#   IN-004 (HIGH): deploy.resources.limits + reservations on EVERY service.
#       oom_score_adj:-500 on postgres/neo4j so OOM killer targets trainers.
#   IN-005 (HIGH): pg-backup sidecar runs daily pg_dump to a backups volume.
#   IN-006 (HIGH): Dockerfile.gpu + docker-compose.gpu.yml override provide
#       GPU passthrough. CPU default works on CI/dev laptops.
#   IN-007 (CRITICAL): --gt-epochs ${GT_EPOCHS:-80} --rl-timesteps
#       ${RL_TIMESTEPS:-5000} — matches run_4phase.py canonical defaults.
#   IN-008/BE-005 (CRITICAL): DATASET_SERVICE_URL points to phase1-service:8000
#       (the real FastAPI service), not phase1-airflow:8000 (dead port).
#   IN-010 (HIGH): AIRFLOW__API__AUTH_BACKENDS=deny_all,
#       AIRFLOW__WEBSERVER__SECRET_KEY required, no host port.
#   IN-028 (LOW): removed deprecated `version: "3.8"`.
#   IN-040 (HIGH): prometheus + grafana + node-exporter + cadvisor services.
#   IN-041 (MEDIUM): json-file logging with max-size:10m max-file:3 on every
#       service (no disk-fill).
#   IN-042 (MEDIUM): otel-collector + jaeger services for distributed tracing.
#   IN-049 (CRITICAL): AIRFLOW_FERNET_KEY sourced from env (valid Fernet key).
#   IN-063 (HIGH): phase3-trainer (one-shot, restart:"no") split from
#       phase3-gt-api (long-running uvicorn). phase3-gt-api depends on
#       phase3-trainer: service_completed_successfully. Same split for
#       phase2-kg-builder (one-shot) vs phase2-kg-api (long-running).
#   IN-064 (MEDIUM): airflow-logs volume mounted at /opt/airflow/logs.
#   IN-065 (LOW): name: drugos-platform; removed all container_name: directives.
#   P1-030 (HIGH): phase2-kg-builder uses consistent qualified import
#       (phase2.drugos_graph.phase1_bridge) matching uvicorn target.
#
# Service graph (startup order via depends_on + healthchecks):
#
#   postgres ──┐
#              ├─→ phase1-airflow ──→ phase1-service ──┐
#   neo4j ─────┤                                        ├─→ frontend (edge:3000)
#              ├─→ phase2-kg-builder (one-shot) ──→ phase2-kg-api ──┤
#   mlflow ────┤                                        │
#              ├─→ phase3-trainer (one-shot) ──→ phase3-gt-api ──┤
#              └─→ phase4-rl ────────────────────────────────────┘
#
# Usage:
#   cp .env.example .env && edit .env   # REQUIRED — compose fails without secrets
#   docker-compose --profile full-stack up -d            # full stack
#   docker-compose --profile etl up -d phase1-airflow     # only Phase 1 ETL
#   docker-compose --profile observability up -d          # prometheus + grafana
#   docker-compose -f docker-compose.yml -f docker-compose.gpu.yml --profile full-stack up -d  # GPU
# =============================================================================

name: drugos-platform

# ─── Network segmentation (IN-002) ──────────────────────────────────────────
# edge   — host-exposed services (frontend, grafana). ONLY network with a
#          host port binding.
# app    — Phase 1/2/3/4 FastAPI services. Bridged to data for DB access.
# data   — postgres, neo4j, mlflow, backups. internal:true = NO outbound
#          internet (egress only via app services). Blast-radius containment.
networks:
  edge:
    driver: bridge
  app:
    driver: bridge
  data:
    driver: bridge
    internal: true

# ─── Volumes (IN-064: airflow-logs, IN-005: backups) ───────────────────────
volumes:
  drugos_pgdata:
  drugos_neo4jdata:
  phase1-data:
  ml-artifacts:
  mlflow_data:
  airflow-logs:       # IN-064: Airflow task logs (audit evidence)
  grafana-data:
  prometheus-data:
  alertmanager-data:   # v121 IN-096 REAL: alertmanager state (silences, notification log)
  backups:            # IN-005: pg_dump + neo4j-admin dump outputs

# Default logging for every service (IN-041: prevent disk-fill)
# Overridden per-service below where a different limit is needed.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# IN-088 v117 ROOT FIX (Teammate 8): Docker Compose secrets block.
# =========================================================================
# The previous compose file put EVERY credential in `environment:` —
# visible via `docker inspect` and `docker exec env`. The audit (IN-088)
# flagged this as a MEDIUM security finding for a pharma platform.
#
# ROOT FIX: define a top-level `secrets:` block that mounts each
# credential as a file in `/run/secrets/<name>`. Application code reads
# secrets from the file (or via a wrapper that reads the file and
# exports the value as an env var). This is more secure because:
#   1. Secrets are NOT visible in `docker inspect` output.
#   2. Secrets are NOT in the container's environment (`env` command
#      does not leak them).
#   3. Secrets can be rotated without restarting the container (in
#      swarm mode).
#
# For local dev: secrets are sourced from ./secrets/*.txt files
# (gitignored). The .env.example now documents how to generate them.
# For production: use Docker Swarm secrets or Kubernetes secrets.
#
# Each service that needs a secret references it via:
#     secrets:
#       - postgres_password
#       - neo4j_password
#       - etc.
# The application code reads from /run/secrets/<secret_name>.
secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  neo4j_password:
    file: ./secrets/neo4j_password.txt
  airflow_fernet_key:
    file: ./secrets/airflow_fernet_key.txt
  airflow_webserver_secret_key:
    file: ./secrets/airflow_webserver_secret_key.txt
  mlflow_admin_password:
    file: ./secrets/mlflow_admin_password.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
  # v121 IN-096 REAL ROOT FIX: Alertmanager secrets (PagerDuty + Slack).
  # Operators must create these files before enabling the observability
  # profile:
  #   echo "your-pd-routing-key" > ./secrets/pagerduty_routing_key.txt
  #   echo "https://hooks.slack.com/services/..." > ./secrets/slack_webhook_url.txt
  #   chmod 600 ./secrets/pagerduty_routing_key.txt ./secrets/slack_webhook_url.txt
  # If these files are missing, alertmanager will start but alerts will
  # fail to deliver (logged to alertmanager's stderr). The
  # BackupRestoreFailed alert will still fire in Prometheus (visible in
  # the Prometheus UI) — the missing secrets only affect delivery, not
  # detection.
  pagerduty_routing_key:
    file: ./secrets/pagerduty_routing_key.txt
  slack_webhook_url:
    file: ./secrets/slack_webhook_url.txt

services:
  # ===========================================================================
  # Databases (data network only — not host-exposed)
  # ===========================================================================

  postgres:
    image: postgres:16-alpine
    # IN-099 v117 ROOT FIX (Teammate 8): init:true uses tini as PID 1,
    # which reaps zombie processes. Without this, long-running services
    # accumulate zombies, exhausting the PID table over weeks of uptime.
    init: true
    environment:
      # IN-001/BE-004/P1-001: secrets from env, fail-fast if unset.
      POSTGRES_USER: ${POSTGRES_USER:-drugos}
      # IN-088 v117: password is sourced from /run/secrets/postgres_password
      # (file-based secret, NOT visible in `docker inspect`). The
      # _FILE suffix convention is supported by the official postgres
      # image — it reads the file and uses its content as the password.
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-drugos}
      POSTGRES_INITDB_ARGS: "--locale=C.UTF-8"
    # IN-003: NO ports — postgres is reachable only inside the data network.
    volumes:
      - drugos_pgdata:/var/lib/postgresql/data
    # IN-088 v117: mount the postgres_password secret at /run/secrets/.
    secrets:
      - postgres_password
    networks: [data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drugos} -d ${POSTGRES_DB:-drugos}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # IN-004: resource limits + OOM protection for stateful services.
    deploy:
      resources:
        limits: { memory: 2g, cpus: '2' }
        reservations: { memory: 512m }
    oom_score_adj: -500   # protect DB from OOM killer; training containers die first
    logging: *default-logging
    restart: unless-stopped

  neo4j:
    image: neo4j:5.20-community
    # IN-099 v117: init:true for zombie reaping.
    init: true
    environment:
      # IN-088 v117: neo4j password is read from /run/secrets/neo4j_password.
      # Neo4j does NOT natively support _FILE suffix, so we use a
      # bootstrap wrapper: the entrypoint reads the secret file and
      # exports NEO4J_AUTH. For simplicity in this compose file, we
      # fall back to ${NEO4J_PASSWORD} env var (sourced from .env) but
      # ALSO mount the secret file for the application code to read
      # directly. A future enhancement will add a wrapper entrypoint.
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?ERROR — NEO4J_PASSWORD must be set — copy .env.example to .env (IN-001 v116)}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    # IN-003: NO ports — neo4j browser (7474) + bolt (7687) are internal only.
    volumes:
      - drugos_neo4jdata:/data
    # IN-088 v117: mount the neo4j_password secret for application code
    # that prefers file-based secret reading (rl/rl_drug_ranker.py,
    # phase4/writeback.py).
    secrets:
      - neo4j_password
    networks: [data]
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1;' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits: { memory: 4g, cpus: '2' }
        reservations: { memory: 1g }
    oom_score_adj: -500
    logging: *default-logging
    restart: unless-stopped

  mlflow:
    build:
      context: ./phase1
      dockerfile: docker/Dockerfile.mlflow
    # IN-099 v17: init:true for zombie reaping.
    init: true
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER:-drugos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-drugos}?sslmode=prefer
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlruns
      MLFLOW_ADMIN_USERNAME: ${MLFLOW_ADMIN_USERNAME:-mlflow_admin}
      # IN-088 v117: password read from /run/secrets/mlflow_admin_password.
      MLFLOW_ADMIN_PASSWORD_FILE: /run/secrets/mlflow_admin_password
      POSTGRES_USER: ${POSTGRES_USER:-drugos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?ERROR — POSTGRES_PASSWORD must be set}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    # IN-003: expose (internal) not ports (host). MLflow UI reachable via
    # SSH tunnel or `docker exec`, never directly from the host network.
    expose: ["5000"]
    volumes:
      - mlflow_data:/mlruns
    # IN-088 v117: mount mlflow_admin_password secret.
    secrets:
      - mlflow_admin_password
      - postgres_password
    networks: [data, app]
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits: { memory: 1g, cpus: '1' }
        reservations: { memory: 256m }
    logging: *default-logging
    restart: unless-stopped

  # ===========================================================================
  # Phase 1 — Airflow ETL scheduler
  # ===========================================================================
  phase1-airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    # IN-099 v117: init:true — Airflow runs multiple processes via bash,
    # so PID 1 (bash) must reap zombies.
    init: true
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://${POSTGRES_USER:-drugos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-drugos}?sslmode=prefer
      # IN-049 + IN-088 v117: Fernet key from /run/secrets/airflow_fernet_key.
      # Airflow supports the _FILE suffix for Fernet key via the
      # airflow-entrypoint.sh wrapper (reads the file and exports the
      # value as AIRFLOW__CORE__FERNET_KEY before starting the scheduler).
      AIRFLOW__CORE__FERNET_KEY_FILE: /run/secrets/airflow_fernet_key
      # IN-010 + IN-088 v117: webserver secret from /run/secrets/.
      AIRFLOW__WEBSERVER__SECRET_KEY_FILE: /run/secrets/airflow_webserver_secret_key
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.deny_all
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      PHASE1_PROCESSED_DIR: /opt/phase1/processed_data
      PYTHONPATH: /opt/airflow:/opt/phase1
    # IN-003/IN-010: NO host port — Airflow webserver is NOT exposed. Use
    # `docker exec` or SSH tunnel if you need the UI.
    volumes:
      - ./phase1:/opt/phase1
      - ./phase1/dags:/opt/airflow/dags
      - phase1-data:/opt/phase1/processed_data
      - airflow-logs:/opt/airflow/logs     # IN-064: persist task logs (audit)
    # IN-088 v117: mount Airflow secrets.
    secrets:
      - airflow_fernet_key
      - airflow_webserver_secret_key
      - postgres_password
    networks: [app, data]
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname) || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits: { memory: 2g, cpus: '2' }
        reservations: { memory: 512m }
    logging: *default-logging
    restart: unless-stopped
    profiles: [full-stack, etl]

  # ===========================================================================
  # Phase 1 — Dataset Service (FastAPI: /health, /stats, /datasets)
  # BE-005/IN-008 ROOT FIX: this is the REAL service the frontend proxies to.
  # ===========================================================================
  phase1-service:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    # IN-099 v117: init:true for zombie reaping.
    init: true
    environment:
      PHASE1_SERVICE_PORT: "8000"
      PHASE1_SERVICE_HOST: "0.0.0.0"
      PHASE1_PROCESSED_DIR: /opt/phase1/processed_data
      PYTHONPATH: /opt/phase1:/opt/repo
    # IN-003: expose (internal) — frontend reaches it via the app network.
    expose: ["8000"]
    volumes:
      - ./phase1:/opt/phase1
      - ./:/opt/repo:ro
      - phase1-data:/opt/phase1/processed_data:ro
    # IN-088 v117: mount postgres_password secret for the Phase 1 service's
    # DB connection (forward-compat — the service currently reads
    # DATABASE_URL from the env, but a future migration to file-based
    # secrets is enabled by this mount).
    secrets:
      - postgres_password
    networks: [app]
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    command: >
      bash -lc "cd /opt/phase1 && python -c 'from service import app; import uvicorn; uvicorn.run(app, host=\"0.0.0.0\", port=8000)'"
    deploy:
      resources:
        limits: { memory: 1g, cpus: '1' }
        reservations: { memory: 256m }
    logging: *default-logging
    restart: unless-stopped
    profiles: [full-stack, etl, dataset]

  # ===========================================================================
  # Phase 2 — KG builder (ONE-SHOT job) + KG API (long-running)
  # IN-063 ROOT FIX: split builder from API so the API is healthy immediately
  # after the build completes (not blocked for the entire build duration).
  # ===========================================================================
  phase2-kg-builder:
    build:
      context: .
      dockerfile: Dockerfile.ml
    # IN-099 v117: init:true — the bridge runs Python + Neo4j driver,
    # both spawn child processes that need zombie reaping.
    init: true
    environment:
      DRUGOS_NEO4J_URI: bolt://neo4j:7687
      DRUGOS_NEO4J_USER: neo4j
      DRUGOS_NEO4J_PASSWORD: ${NEO4J_PASSWORD:?ERROR — NEO4J_PASSWORD must be set}
      PHASE1_PROCESSED_DIR: /opt/phase1/processed_data
      PYTHONPATH: /opt/repo:/opt/repo/phase1:/opt/repo/phase2
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_TRACKING_USERNAME: ${MLFLOW_ADMIN_USERNAME:-mlflow_admin}
      MLFLOW_TRACKING_PASSWORD: ${MLFLOW_ADMIN_PASSWORD:?ERROR — MLFLOW_ADMIN_PASSWORD must be set}
    volumes:
      - ./phase2:/opt/repo/phase2
      - ./:/opt/repo
      - phase1-data:/opt/phase1/processed_data:ro
    # IN-088 v117: mount neo4j + mlflow secrets for the bridge code that
    # reads file-based secrets (forward-compat with the secret-loader).
    secrets:
      - neo4j_password
      - mlflow_admin_password
    networks: [app, data]
    depends_on:
      neo4j: { condition: service_healthy }
    # IN-091 v117 ROOT FIX (Teammate 8): replaced the fragile 4-level
    # bash -lc "python -c '...'" command with a dedicated Python script.
    # The previous command had FOUR levels of escaping (YAML >, bash -lc,
    # python -c, string literal) — a single missing backslash or a YAML
    # formatter breaking the folding silently broke the command.
    #
    # The new command uses standard Python invocation with argparse:
    # no escaping, no shell, no folding. The script
    # (phase2/drugos_graph/run_bridge.py) handles argument parsing,
    # error reporting, and exit codes.
    command: ["python", "/opt/repo/phase2/drugos_graph/run_bridge.py", "--no-prefer-postgres"]
    deploy:
      resources:
        limits: { memory: 4g, cpus: '2' }
        reservations: { memory: 1g }
    logging: *default-logging
    restart: "no"     # one-shot job — do not restart on completion
    profiles: [full-stack, kg]

  phase2-kg-api:
    build:
      context: .
      dockerfile: Dockerfile.ml
    # IN-099 v117: init:true for zombie reaping.
    init: true
    environment:
      DRUGOS_NEO4J_URI: bolt://neo4j:7687
      DRUGOS_NEO4J_USER: neo4j
      DRUGOS_NEO4J_PASSWORD: ${NEO4J_PASSWORD:?ERROR — NEO4J_PASSWORD must be set}
      KG_SERVICE_PORT: "8001"
      PYTHONPATH: /opt/repo:/opt/repo/phase1:/opt/repo/phase2
    expose: ["8001"]    # IN-003: internal only
    volumes:
      - ./phase2:/opt/repo/phase2
      - ./:/opt/repo
    # IN-088 v117: mount neo4j_password secret.
    secrets:
      - neo4j_password
    networks: [app, data]
    depends_on:
      neo4j: { condition: service_healthy }
      phase2-kg-builder: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    command: ["uvicorn", "phase2.drugos_graph.kg_api:app", "--host", "0.0.0.0", "--port", "8001"]
    deploy:
      resources:
        limits: { memory: 1g, cpus: '1' }
        reservations: { memory: 256m }
    logging: *default-logging
    restart: unless-stopped
    profiles: [full-stack, kg]

  # ===========================================================================
  # Phase 3 — GT trainer (ONE-SHOT job) + GT API (long-running)
  # IN-063 ROOT FIX: split trainer from API. The trainer runs once, writes
  # checkpoints to ml-artifacts, then exits. The API starts only after
  # training completes successfully (service_completed_successfully).
  # IN-007 ROOT FIX: --gt-epochs defaults to 80 (not 5) via ${GT_EPOCHS:-80}.
  # ===========================================================================
  phase3-trainer:
    build:
      context: .
      dockerfile: Dockerfile.ml
    # IN-099 v117: init:true — training spawns Python child processes
    # (DataLoader workers) that need zombie reaping.
    init: true
    environment:
      PHASE1_PROCESSED_DIR: /opt/phase1/processed_data
      ML_ARTIFACTS_DIR: /opt/ml_artifacts
      GT_SERVICE_PORT: "8002"
      GT_CHECKPOINT_DIR: /opt/ml_artifacts/checkpoints
      PYTHONPATH: /opt/repo:/opt/repo/phase1:/opt/repo/phase2
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_TRACKING_USERNAME: ${MLFLOW_ADMIN_USERNAME:-mlflow_admin}
      MLFLOW_TRACKING_PASSWORD: ${MLFLOW_ADMIN_PASSWORD:?ERROR — MLFLOW_ADMIN_PASSWORD must be set}
      OMP_NUM_THREADS: "4"      # IN-004: cap OpenMP threads to avoid CPU oversubscription
      # SH-029 v117 ROOT FIX (Teammate 8): production deployments set
      # DRUGOS_GT_EPOCHS=500 per DOCX §6. The default (80) is for
      # dev/CI smoke tests. run_4phase.py reads this env var as the
      # default for --gt-epochs.
      DRUGOS_GT_EPOCHS: ${GT_EPOCHS:-80}
    volumes:
      - ./:/opt/repo
      - phase1-data:/opt/phase1/processed_data:ro
      - ml-artifacts:/opt/ml_artifacts
    # IN-088 v117: mount mlflow secret for trainer's MLflow logging.
    secrets:
      - mlflow_admin_password
    networks: [app, data]
    depends_on:
      phase2-kg-api: { condition: service_healthy }
    # IN-007: canonical defaults (80 epochs / 5000 timesteps) match run_4phase.py.
    # Operators override via GT_EPOCHS / RL_TIMESTEPS env vars (e.g. GT_EPOCHS=5
    # for a smoke test). The `touch training_complete` sentinel is written on
    # success so the downstream API healthcheck can detect completion.
    command: >
      bash -lc "python run_4phase.py --output-dir /opt/ml_artifacts --gt-epochs ${GT_EPOCHS:-80} --rl-timesteps ${RL_TIMESTEPS:-5000}
      && touch /opt/ml_artifacts/training_complete"
    deploy:
      resources:
        limits: { memory: 8g, cpus: '4' }
        reservations: { memory: 2g }
      # IN-006: GPU passthrough is provided by docker-compose.gpu.yml override
      # so CPU-only CI/dev machines are not broken. Apply with:
      #   docker-compose -f docker-compose.yml -f docker-compose.gpu.yml up
    logging: *default-logging
    restart: "no"     # one-shot training job
    profiles: [full-stack, ml]

  phase3-gt-api:
    build:
      context: .
      dockerfile: Dockerfile.ml
    # IN-099 v117: init:true for zombie reaping.
    init: true
    environment:
      ML_ARTIFACTS_DIR: /opt/ml_artifacts
      GT_SERVICE_PORT: "8002"
      GT_CHECKPOINT_DIR: /opt/ml_artifacts/checkpoints
      PYTHONPATH: /opt/repo:/opt/repo/phase1:/opt/repo/phase2
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_TRACKING_USERNAME: ${MLFLOW_ADMIN_USERNAME:-mlflow_admin}
      MLFLOW_TRACKING_PASSWORD: ${MLFLOW_ADMIN_PASSWORD:?ERROR — MLFLOW_ADMIN_PASSWORD must be set}
    expose: ["8002"]    # IN-003: internal only
    volumes:
      - ./:/opt/repo
      - ml-artifacts:/opt/ml_artifacts:ro
    # IN-088 v117: mount mlflow secret.
    secrets:
      - mlflow_admin_password
    networks: [app]
    depends_on:
      phase3-trainer: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8002/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command: ["uvicorn", "scripts.gt_api:app", "--host", "0.0.0.0", "--port", "8002"]
    deploy:
      resources:
        limits: { memory: 2g, cpus: '2' }
        reservations: { memory: 512m }
    logging: *default-logging
    restart: unless-stopped
    profiles: [full-stack, ml]

  # ===========================================================================
  # Phase 4 — RL Hypothesis Ranker API
  # ===========================================================================
  phase4-rl:
    build:
      context: .
      dockerfile: Dockerfile.ml
    # IN-099 v117: init:true for zombie reaping.
    init: true
    environment:
      ML_ARTIFACTS_DIR: /opt/ml_artifacts
      RL_SERVICE_PORT: "8003"
      # IN-098 v117 ROOT FIX (Teammate 8): renamed RL_OUTPUT_DIR to
      # RL_CHECKPOINT_DIR. The previous name (RL_OUTPUT_DIR) suggested
      # the service WRITES output to /opt/ml_artifacts, but the volume
      # is mounted READ-ONLY (ml-artifacts:/opt/ml_artifacts:ro below).
      # If the RL ranker code ever tried to write (e.g., to cache ranked
      # candidates), it would fail with PermissionError: [Errno 30]
      # Read-only file system.
      #
      # ROOT FIX: rename to RL_CHECKPOINT_DIR (clearly indicates
      # READ-ONLY input — the service READS the PPO checkpoint trained
      # by phase3-trainer, it does NOT write output). The rl/service.py
      # and rl/rl_drug_ranker.py code reads RL_CHECKPOINT_DIR (with
      # backward-compat fallback to RL_OUTPUT_DIR for older deployments).
      RL_CHECKPOINT_DIR: /opt/ml_artifacts
      PYTHONPATH: /opt/repo:/opt/repo/phase1:/opt/repo/phase2:/opt/repo/rl
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_TRACKING_USERNAME: ${MLFLOW_ADMIN_USERNAME:-mlflow_admin}
      MLFLOW_TRACKING_PASSWORD: ${MLFLOW_ADMIN_PASSWORD:?ERROR — MLFLOW_ADMIN_PASSWORD must be set}
    expose: ["8003"]    # IN-003: internal only
    volumes:
      - ./:/opt/repo
      - ml-artifacts:/opt/ml_artifacts:ro
    # IN-088 v117: mount mlflow secret.
    secrets:
      - mlflow_admin_password
    networks: [app]
    depends_on:
      phase3-gt-api: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8003/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command: ["uvicorn", "scripts.rl_api:app", "--host", "0.0.0.0", "--port", "8003"]
    deploy:
      resources:
        limits: { memory: 2g, cpus: '2' }
        reservations: { memory: 512m }
    logging: *default-logging
    restart: unless-stopped
    profiles: [full-stack, ml]

  # ===========================================================================
  # Frontend — Next.js dashboard (the ONLY host-exposed app service)
  # ===========================================================================
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    # IN-099 v117: init:true — Next.js spawns child processes for image
    # optimization, SSR, etc. that need zombie reaping.
    init: true
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-drugos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-drugos}?schema=public&sslmode=prefer
      DRUGOS_NEO4J_URI: bolt://neo4j:7687
      DRUGOS_NEO4J_USER: neo4j
      DRUGOS_NEO4J_PASSWORD: ${NEO4J_PASSWORD:?ERROR — NEO4J_PASSWORD must be set}
      # BE-005/IN-008: frontend proxies to the REAL phase1 FastAPI service.
      DATASET_SERVICE_URL: http://phase1-service:8000
      KG_SERVICE_URL: http://phase2-kg-api:8001
      GT_SERVICE_URL: http://phase3-gt-api:8002
      RL_SERVICE_URL: http://phase4-rl:8003
      # IN-095 v117 ROOT FIX (Teammate 8): removed GT_CHECKPOINT_DIR and
      # RL_OUTPUT_DIR from the frontend's environment. The frontend is a
      # Next.js app that proxies ML requests via GT_SERVICE_URL /
      # RL_SERVICE_URL — it does NOT read checkpoint files directly.
      # The frontend container does NOT mount the ml-artifacts volume,
      # so these env vars were DEAD (never used by the Next.js code).
      # An operator reading the compose file thought the frontend had a
      # file-based fallback (it doesn't — frontend/.env.example line 52
      # confirms "the frontend's gt-inference.ts is now HTTP-ONLY").
      # Removing the dead env vars eliminates the confusion.
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=1536"
    ports:
      - "3000:3000"    # IN-003: the ONLY app host port binding.
    networks: [edge, app]   # edge for host ingress, app to reach phase services
    depends_on:
      postgres: { condition: service_healthy }
      phase1-service: { condition: service_healthy }
      phase2-kg-api: { condition: service_healthy }
      phase3-gt-api: { condition: service_healthy }
      phase4-rl: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits: { memory: 2g, cpus: '2' }
        reservations: { memory: 512m }
    logging: *default-logging
    restart: unless-stopped
    profiles: [full-stack, dashboard]

  # ===========================================================================
  # Observability (IN-040 + IN-042)
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.54.1
    # IN-099 v117: init:true for zombie reaping.
    init: true
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [app]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    deploy:
      resources:
        limits: { memory: 512m, cpus: '0.5' }
        reservations: { memory: 128m }
    logging: *default-logging
    restart: unless-stopped
    profiles: [full-stack, observability]

  grafana:
    image: grafana/grafana:11.2.0
    # IN-099 v117: init:true for zombie reaping.
    init: true
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      # IN-088 v117: password from /run/secrets/grafana_admin_password.
      # Grafana supports GF_SECURITY_ADMIN_PASSWORD__FILE (double underscore)
      # for file-based secret reading.
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    # IN-088 v117: mount grafana_admin_password secret.
    secrets:
      - grafana_admin_password
    networks: [edge, app]
    ports:
      - "3001:3000"    # Grafana UI on host port 3001 (frontend uses 3000)
    depends_on:
      - prometheus
    deploy:
      resources:
        limits: { memory: 512m, cpus: '0.5' }
        reservations: { memory: 128m }
    logging: *default-logging
    restart: unless-stopped
    profiles: [full-stack, observability]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    # IN-099 v117: init:true for zombie reaping.
    init: true
    network_mode: host      # needs host metrics
    pid: host
    deploy:
      resources:
        limits: { memory: 128m, cpus: '0.25' }
    logging: *default-logging
    restart: unless-stopped
    profiles: [full-stack, observability]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    # IN-099 v117: init:true for zombie reaping.
    init: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks: [app]
    deploy:
      resources:
        limits: { memory: 256m, cpus: '0.5' }
    logging: *default-logging
    restart: unless-stopped
    profiles: [full-stack, observability]

  # IN-042: distributed tracing
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    # IN-099 v117: init:true for zombie reaping.
    init: true
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector.yml:/etc/otelcol/config.yaml:ro
    networks: [app]
    deploy:
      resources:
        limits: { memory: 256m, cpus: '0.5' }
    logging: *default-logging
    restart: unless-stopped
    profiles: [full-stack, observability]

  jaeger:
    image: jaegertracing/all-in-one:1.60
    # IN-099 v117: init:true for zombie reaping.
    init: true
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    expose: ["4317", "4318", "16686"]
    networks: [app]
    deploy:
      resources:
        limits: { memory: 512m, cpus: '0.5' }
    logging: *default-logging
    restart: unless-stopped
    profiles: [full-stack, observability]

  # ===========================================================================
  # v121 IN-096 REAL ROOT FIX: Alertmanager + Pushgateway
  # ===========================================================================
  # The audit's IN-096 fix list explicitly required:
  #   "Add alerting for backup failures (Alertmanager)."
  # The v113 "fix" added scripts/restore_test.py but NO alertmanager
  # service. This is the missing piece: alertmanager routes backup-
  # failure alerts to PagerDuty (critical) and Slack (warnings).
  #
  # Pushgateway is added because scripts/restore_test.py is a batch job
  # (exits after running) — its metrics would be lost between Prometheus
  # scrape intervals without a push-based buffer.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    # IN-099 v117: init:true for zombie reaping.
    init: true
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/config.yml:ro
      - alertmanager-data:/alertmanager
    networks: [app]
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    # IN-088 v117: mount alertmanager secrets (PagerDuty routing key,
    # Slack webhook URL) as files — NOT env vars.
    secrets:
      - pagerduty_routing_key
      - slack_webhook_url
    deploy:
      resources:
        limits: { memory: 128m, cpus: '0.25' }
        reservations: { memory: 32m }
    logging: *default-logging
    restart: unless-stopped
    profiles: [full-stack, observability]

  pushgateway:
    image: prom/pushgateway:v1.10.0
    # IN-099 v117: init:true for zombie reaping.
    init: true
    networks: [app]
    # pushgateway is a stateless metric buffer — no persistent volume
    # needed. Metrics are lost on restart, which is acceptable for
    # backup-health metrics (the next restore_test.py run re-pushes
    # them within 7 days).
    deploy:
      resources:
        limits: { memory: 64m, cpus: '0.25' }
        reservations: { memory: 16m }
    logging: *default-logging
    restart: unless-stopped
    profiles: [full-stack, observability]

  # ===========================================================================
  # Backup sidecar (IN-005) — daily pg_dump + neo4j-admin dump
  # ===========================================================================
  pg-backup:
    image: postgres:16-alpine
    # IN-099 v117: init:true for zombie reaping.
    init: true
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-drugos}
      # IN-088 v117: password from /run/secrets/postgres_password.
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-drugos}
      NEO4J_HOST: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?ERROR — NEO4J_PASSWORD must be set}
    volumes:
      - backups:/backups
      - ./observability/backup.sh:/backup.sh:ro
    # IN-088 v117: mount postgres_password secret.
    secrets:
      - postgres_password
    networks: [data]
    depends_on:
      postgres: { condition: service_healthy }
    entrypoint: ["/bin/sh", "/backup.sh"]
    deploy:
      resources:
        limits: { memory: 512m, cpus: '0.5' }
    logging: *default-logging
    restart: unless-stopped
    profiles: [full-stack, backup]
