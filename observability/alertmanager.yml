# v121 IN-096 REAL ROOT FIX: Alertmanager configuration.
#
# The audit's IN-096 fix list explicitly required:
#   "Add alerting for backup failures (Alertmanager)."
# The v113 "fix" added scripts/restore_test.py but NO alertmanager
# rules — a backup could silently fail for weeks and nobody would
# know until a real disaster hit and the restore failed.
#
# This file is the Alertmanager service config (routing + receivers).
# The Prometheus alert RULES live in observability/alerts.yml
# (loaded via prometheus.yml's rule_files).
#
# Routing policy:
#   * backup_restore_failed → pagerduty (critical, 24/7)
#     - This is a patient-safety alert. A failed restore means the
#       platform cannot recover from a disaster. FDA 21 CFR Part 11
#       (referenced in .env.example line 239) requires data integrity
#       controls including backup verification.
#   * backup_age_exceeded_rpo → pagerduty (critical, 24/7)
#     - The newest backup is older than the RPO window. Data loss
#       exceeds the documented limit.
#   * backup_never_run → slack (warning, business hours)
#     - The backup job hasn't been observed in 25 hours. May indicate
#       a cron misconfiguration or a backup service crash.
#
# Secrets (PD_SERVICE_ID, SLACK_WEBHOOK_URL) are read from /run/secrets/
# per IN-088 v117 (no secrets in env vars). Operators must add the
# corresponding Docker secrets:
#   echo "your-pd-key" | docker secret create pagerduty_routing_key -
#   echo "https://hooks.slack.com/..." | docker secret create slack_webhook_url -

global:
  resolve_timeout: 5m
  # Slack API URL is read from the mounted secret (no env var).
  slack_api_url_file: /run/secrets/slack_webhook_url

route:
  receiver: default-slack
  group_by: ['alertname', 'job', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Patient-safety critical: page immediately.
    - matchers:
        - alertname = "BackupRestoreFailed"
        - alertname = "BackupAgeExceededRPO"
      receiver: pagerduty-critical
      group_wait: 0s
      repeat_interval: 1h
    # Warning: backup job not running.
    - matchers:
        - alertname = "BackupJobNotRunning"
      receiver: slack-warnings
      group_wait: 5m
      repeat_interval: 12h

receivers:
  - name: default-slack
    slack_configs:
      - channel: '#drugos-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          {{ .CommonAnnotations.summary }}
          {{ .CommonAnnotations.description }}
          Runbook: {{ .CommonAnnotations.runbook_url }}

  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key_file: /run/secrets/pagerduty_routing_key
        description: '{{ .CommonLabels.alertname }}: {{ .CommonAnnotations.summary }}'
        severity: critical
        class: backup
        group: drugos-platform
        component: backup
    # Also send to Slack for visibility.
    slack_configs:
      - channel: '#drugos-alerts'
        send_resolved: true
        title: ':rotating_light: [CRITICAL] {{ .CommonLabels.alertname }}'
        text: >-
          {{ .CommonAnnotations.summary }}
          {{ .CommonAnnotations.description }}
          Runbook: {{ .CommonAnnotations.runbook_url }}

  - name: slack-warnings
    slack_configs:
      - channel: '#drugos-warnings'
        send_resolved: true
        title: '[WARNING] {{ .CommonLabels.alertname }}'
        text: >-
          {{ .CommonAnnotations.summary }}
          {{ .CommonAnnotations.description }}

# Inhibit rules: if BackupRestoreFailed fires, suppress BackupAgeExceededRPO
# (the restore failure is the more actionable alert — don't page twice
# for the same underlying issue).
inhibit_rules:
  - source_matchers:
      - alertname = "BackupRestoreFailed"
    target_matchers:
      - alertname = "BackupAgeExceededRPO"
    equal: ['job']
