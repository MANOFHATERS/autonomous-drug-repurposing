# =============================================================================
# phase1/docker-compose.yml — Phase 1 dev-only stack (Airflow + Postgres +
# Neo4j + MLflow). NOT for production — production uses the root
# docker-compose.yml which has network segmentation, GPU support, and the
# full 4-phase service graph.
# =============================================================================
# v118 ROOT FIX (Teammate 15 — Infrastructure, issues
# IN-001/IN-002/IN-003/IN-004/IN-005/IN-041/IN-064):
#   IN-001 (CRITICAL): replaced every `${POSTGRES_PASSWORD:-cosmic}` default
#       with `${POSTGRES_PASSWORD:?ERROR}` so the compose FAILS FAST if any
#       required secret is unset. The previous "v37 ROOT FIX" comment
#       claimed this was done but it was NOT — 9 places still silently
#       defaulted to the publicly-known "cosmic" password. The dev .env
#       can still set POSTGRES_PASSWORD=cosmic for backward compatibility,
#       but production operators are now FORCED to set it explicitly.
#   IN-002 (HIGH): added three segmented networks (edge / app / data).
#       data is internal:true (no outbound internet). postgres + neo4j +
#       mlflow are data-only; airflow services bridge app + data.
#   IN-003 (HIGH): removed the hardcoded `ports: - "5432:5432"` on postgres,
#       `ports: - "8080:8080"` on airflow-webserver, and `ports: - "7474:7474"
#       - "7687:7687"` on neo4j. Dev operators who need localhost access can
#       set the *_BIND_HOST_PORT env var (e.g. POSTGRES_BIND_HOST_PORT=
#       127.0.0.1:5432) in .env — default is no host binding.
#   IN-004 (HIGH): added deploy.resources.limits + reservations on EVERY
#       service. oom_score_adj:-500 on postgres + neo4j so the OOM killer
#       targets the training containers (not the stateful DBs) first.
#   IN-005 (HIGH): added a pg-backup sidecar that runs daily pg_dump to a
#       `backups` volume (mirrors the root compose pattern).
#   IN-041 (MEDIUM): added x-logging anchor with json-file driver +
#       max-size:10m + max-file:3 on every service (prevents disk-fill).
#   IN-064 (MEDIUM): added `airflow-logs` volume mounted at
#       /opt/airflow/logs so Airflow task logs (audit evidence under FDA
#       21 CFR Part 11) persist across container restarts.
#   Compound: added `init: true` on every service (PID 1 zombie reaping —
#       Airflow runs multiple bash-spawned child processes that need
#       reaping). Added `name: drugos-platform-phase1` to avoid container
#       name collisions with the root compose stack. Removed the DUPLICATE
#       `volumes:` block in airflow-init (YAML override hazard — the second
#       block was silently shadowing the first).
#
# v37/v49/v75/v100/v113 PRESERVED fixes (verified still in place):
#   - postgres:16-alpine + C.UTF-8 locale (IN-045 v113)
#   - Setup service healthcheck with `test -w` (T-043 v76)
#   - airflow-init `restart: on-failure:3` (IN-093)
#   - airflow-init entrypoint via airflow-init.sh (P1-010 v113)
#   - All P1-003 mount points (data/, exporters/, scripts/)
#   - MLflow auth + 127.0.0.1 binding (IN-009 v113)
#   - Scheduler heartbeat healthcheck (T-028 v75)
#   - Neo4j password fail-fast (v49)
# =============================================================================

name: drugos-platform-phase1

# ─── Network segmentation (IN-002) ──────────────────────────────────────────
# edge — host-exposed services (none in this dev stack by default).
# app  — airflow services (webserver, scheduler, init).
# data — postgres, neo4j, mlflow. internal:true = NO outbound internet.
networks:
  edge:
    driver: bridge
  app:
    driver: bridge
  data:
    driver: bridge
    internal: true

# ─── Volumes (IN-064: airflow-logs, IN-005: backups) ───────────────────────
volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  mlflow_data:
  airflow-logs:       # IN-064: persist Airflow task logs (audit evidence)
  backups:            # IN-005: pg_dump outputs

# ─── Default logging (IN-041: prevent disk-fill) ───────────────────────────
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# ─── Default resource limits (IN-004) ──────────────────────────────────────
# Applied to every service via `<<: *default-resources`. Tuned per-service
# below where needed.
x-default-resources: &default-resources
  deploy:
    resources:
      limits: { memory: 1g, cpus: '1' }
      reservations: { memory: 128m }

services:
  # ===========================================================================
  # Postgres — Phase 1 staging DB + Airflow metadata DB + MLflow backend
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    init: true   # IN-099: PID 1 zombie reaping (postgres sometimes spawns helpers)
    environment:
      POSTGRES_INITDB_ARGS: "--locale=C.UTF-8"
      # IN-001 v118: fail-fast if unset. The previous `:-cosmic` default
      # silently fell back to a publicly-known password (audit IN-001
      # explicitly flagged this). Operators MUST set these in .env.
      POSTGRES_USER: ${POSTGRES_USER:?ERROR — POSTGRES_USER must be set in .env (IN-001 v118)}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?ERROR — POSTGRES_PASSWORD must be set in .env (IN-001 v118)}
      POSTGRES_DB: ${POSTGRES_DB:?ERROR — POSTGRES_DB must be set in .env (IN-001 v118)}
    # IN-003 v118: NO host port by default. Dev operators who need psql
    # access set POSTGRES_BIND_HOST_PORT=127.0.0.1:5432 in .env.
    ports:
      - "${POSTGRES_BIND_HOST_PORT:-}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { memory: 2g, cpus: '2' }
        reservations: { memory: 256m }
    oom_score_adj: -500   # IN-004: protect DB from OOM killer
    logging: *default-logging
    restart: unless-stopped

  # ===========================================================================
  # Setup — one-shot init container that creates raw_data/processed_data dirs
  # with correct ownership for the airflow user (UID 50000).
  #
  # IN-076 v122 FORENSIC ROOT FIX (Teammate 7): the audit found:
  #   1. `image: busybox` (unpinned :latest) — non-reproducible builds. A
  #      future busybox release could break the setup script silently.
  #      ROOT FIX: pin to `busybox:1.36.1` (specific version + digest
  #      verification is a future IN-080 enhancement).
  #   2. `chmod 775` gave GROUP-WRITE to UID 0 (root) — any container
  #      running as root could modify the data dirs, allowing data
  #      injection attacks. ROOT FIX: `chmod 750` (only owner + airflow
  #      group can read/write; root group has NO write).
  #   3. The container ran as ROOT (busybox default). The chown -R worked,
  #      but any compromised setup script ran with full root privileges.
  #      ROOT FIX: `user: "50000:0"` runs the container as UID 50000
  #      (airflow) with GID 0 (root group, for read access to bind mounts
  #      created by docker daemon). The chown is now a NO-OP (the dirs
  #      are already owned by 50000) but is retained for forward compat
  #      with future setup scripts that may need it.
  # ===========================================================================
  setup:
    image: busybox:1.36.1
    init: true
    user: "50000:0"   # IN-076: run as airflow UID, not root
    volumes:
      - ./raw_data:/tmp/raw_data
      - ./processed_data:/tmp/processed_data
    command: sh -c "mkdir -p /tmp/raw_data/chembl /tmp/raw_data/drugbank /tmp/raw_data/uniprot /tmp/raw_data/string /tmp/raw_data/disgenet /tmp/raw_data/omim /tmp/raw_data/pubchem /tmp/processed_data && chmod 750 /tmp/raw_data /tmp/raw_data/chembl /tmp/raw_data/drugbank /tmp/raw_data/uniprot /tmp/raw_data/string /tmp/raw_data/disgenet /tmp/raw_data/omim /tmp/raw_data/pubchem /tmp/processed_data && chown -R 50000:0 /tmp/raw_data /tmp/processed_data"
    # T-043 v76: healthcheck verifies WRITABILITY (not just existence) so a
    # chown failure surfaces here, not 20 minutes later in a pipeline task.
    healthcheck:
      test: ["CMD-SHELL", "test -d /tmp/raw_data/chembl && test -w /tmp/raw_data/chembl && test -d /tmp/raw_data/drugbank && test -w /tmp/raw_data/drugbank && test -d /tmp/raw_data/uniprot && test -w /tmp/raw_data/uniprot && test -d /tmp/raw_data/string && test -w /tmp/raw_data/string && test -d /tmp/raw_data/disgenet && test -w /tmp/raw_data/disgenet && test -d /tmp/raw_data/omim && test -w /tmp/raw_data/omim && test -d /tmp/raw_data/pubchem && test -w /tmp/raw_data/pubchem && test -d /tmp/processed_data && test -w /tmp/processed_data"]
      interval: 5s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits: { memory: 128m, cpus: '0.25' }
    logging: *default-logging
    restart: "no"   # one-shot

  # ===========================================================================
  # airflow-init — one-shot DB migration + admin user creation
  # ===========================================================================
  airflow-init:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    init: true
    restart: "on-failure:3"   # IN-093: retry transient init failures
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      # IN-001 v118: fail-fast credentials (no more :-cosmic default).
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}}
      DISGENET_API_KEY: ${DISGENET_API_KEY:-}
      OMIM_API_KEY: ${OMIM_API_KEY:-}
      DRUGOS_ENVIRONMENT: ${DRUGOS_ENVIRONMENT:-development}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-drug_repurposing}
      MLFLOW_TRACKING_USERNAME: ${MLFLOW_ADMIN_USERNAME:-mlflow_admin}
      MLFLOW_TRACKING_PASSWORD: ${MLFLOW_ADMIN_PASSWORD:?ERROR — MLFLOW_ADMIN_PASSWORD must be set (IN-009 v113)}
      # v118: Airflow admin user — required if the operator runs
      # `airflow webserver` (the dev airflow-webserver service below).
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:?ERROR — AIRFLOW_ADMIN_USER must be set (v49 security fix removed admin/admin default)}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:?ERROR — AIRFLOW_ADMIN_PASSWORD must be set (v49 security fix removed admin/admin default)}
    # v118: SINGLE volumes block (the previous duplicate `volumes:` keys at
    # lines 127 and 160 were a YAML override hazard — the second silently
    # shadowed the first).
    volumes:
      - ./docker/airflow-init.sh:/opt/airflow/airflow-init.sh:ro
      - ./dags:/opt/airflow/dags
      - ./pipelines:/opt/airflow/pipelines
      - ./cleaning:/opt/airflow/cleaning
      - ./entity_resolution:/opt/airflow/entity_resolution
      - ./database:/opt/airflow/database
      - ./config:/opt/airflow/config
      # P1-003 v100: missing mounts for data/, exporters/, scripts/.
      - ./data:/opt/airflow/data
      - ./exporters:/opt/airflow/exporters
      - ./scripts:/opt/airflow/scripts
      - ./raw_data:/opt/airflow/raw_data
      - ./processed_data:/opt/airflow/processed_data
      # IN-064 v118: persist Airflow task logs (audit evidence).
      - airflow-logs:/opt/airflow/logs
    networks: [app, data]
    depends_on:
      setup:
        condition: service_healthy
      postgres:
        condition: service_healthy
    # P1-010 v113: entrypoint moved to a dedicated shell script to avoid
    # 3-level shell-escaping ambiguity in YAML.
    entrypoint: ["bash", "/opt/airflow/airflow-init.sh"]
    healthcheck:
      test: ["CMD-SHELL", "airflow db check"]
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits: { memory: 1g, cpus: '1' }
        reservations: { memory: 256m }
    logging: *default-logging

  # ===========================================================================
  # airflow-webserver — Airflow UI (dev-only, opt-in host port)
  # ===========================================================================
  airflow-webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    init: true
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
      # T-045 v76: DATABASE_URL built from POSTGRES_USER/PASSWORD so
      # credential overrides propagate correctly.
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}}
      DISGENET_API_KEY: ${DISGENET_API_KEY:-}
      OMIM_API_KEY: ${OMIM_API_KEY:-}
      DRUGOS_ENVIRONMENT: ${DRUGOS_ENVIRONMENT:-development}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-drug_repurposing}
      MLFLOW_TRACKING_USERNAME: ${MLFLOW_ADMIN_USERNAME:-mlflow_admin}
      MLFLOW_TRACKING_PASSWORD: ${MLFLOW_ADMIN_PASSWORD:?ERROR — MLFLOW_ADMIN_PASSWORD must be set (IN-009 v113)}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./pipelines:/opt/airflow/pipelines
      - ./cleaning:/opt/airflow/cleaning
      - ./entity_resolution:/opt/airflow/entity_resolution
      - ./database:/opt/airflow/database
      - ./config:/opt/airflow/config
      # P1-003 v100: missing mounts.
      - ./data:/opt/airflow/data
      - ./exporters:/opt/airflow/exporters
      - ./scripts:/opt/airflow/scripts
      - ./raw_data:/opt/airflow/raw_data
      - ./processed_data:/opt/airflow/processed_data
      # IN-064 v118: persist task logs.
      - airflow-logs:/opt/airflow/logs
    # IN-003 v118: NO host port by default. Dev operators set
    # AIRFLOW_WEBSERVER_BIND_HOST_PORT=127.0.0.1:8080 in .env for local UI access.
    ports:
      - "${AIRFLOW_WEBSERVER_BIND_HOST_PORT:-}:8080"
    networks: [app, data, edge]
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    # P1-040 v113: use python urllib (curl not in the base image).
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8080/health\").read()' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits: { memory: 1g, cpus: '1' }
        reservations: { memory: 256m }
    logging: *default-logging
    restart: unless-stopped

  # ===========================================================================
  # airflow-scheduler — runs DAG tasks (LocalExecutor)
  # ===========================================================================
  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    init: true
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}}
      DISGENET_API_KEY: ${DISGENET_API_KEY:-}
      OMIM_API_KEY: ${OMIM_API_KEY:-}
      DRUGOS_ENVIRONMENT: ${DRUGOS_ENVIRONMENT:-development}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-drug_repurposing}
      MLFLOW_TRACKING_USERNAME: ${MLFLOW_ADMIN_USERNAME:-mlflow_admin}
      MLFLOW_TRACKING_PASSWORD: ${MLFLOW_ADMIN_PASSWORD:?ERROR — MLFLOW_ADMIN_PASSWORD must be set (IN-009 v113)}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./pipelines:/opt/airflow/pipelines
      - ./cleaning:/opt/airflow/cleaning
      - ./entity_resolution:/opt/airflow/entity_resolution
      - ./database:/opt/airflow/database
      - ./config:/opt/airflow/config
      # P1-003 v100: missing mounts.
      - ./data:/opt/airflow/data
      - ./exporters:/opt/airflow/exporters
      - ./scripts:/opt/airflow/scripts
      - ./raw_data:/opt/airflow/raw_data
      - ./processed_data:/opt/airflow/processed_data
      # IN-064 v118: persist task logs.
      - airflow-logs:/opt/airflow/logs
    networks: [app, data]
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    # T-028 v75: scheduler heartbeat healthcheck.
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname) --allow-triggering-failures"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits: { memory: 2g, cpus: '2' }
        reservations: { memory: 512m }
    logging: *default-logging
    restart: unless-stopped

  # ===========================================================================
  # Neo4j — Knowledge Graph DB (Phase 2 target)
  # ===========================================================================
  neo4j:
    image: neo4j:5.20-community
    init: true
    environment:
      # v49 ROOT FIX: Neo4j password is required (no weak default).
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:?ERROR — NEO4J_PASSWORD must be set (v49 security fix removed the weak 'cosmicpassword' default)}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    # IN-003 v118: NO host ports by default. Dev operators set
    # NEO4J_BROWSER_BIND_HOST_PORT=127.0.0.1:7474 + NEO4J_BOLT_BIND_HOST_PORT=
    # 127.0.0.1:7687 in .env for local browser/bolt access.
    ports:
      - "${NEO4J_BROWSER_BIND_HOST_PORT:-}:7474"
      - "${NEO4J_BOLT_BIND_HOST_PORT:-}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks: [data]
    # T-044 v76: use curl (wget is not in the neo4j image).
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits: { memory: 4g, cpus: '2' }
        reservations: { memory: 1g }
    oom_score_adj: -500   # IN-004: protect KG DB from OOM killer
    logging: *default-logging
    restart: unless-stopped

  # ===========================================================================
  # MLflow — Experiment tracking (auth-protected, dev localhost binding)
  # ===========================================================================
  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    init: true
    # IN-003 v118: keep the 127.0.0.1 dev-only binding (set in v113).
    # Production uses the root docker-compose.yml which has NO host port.
    ports:
      - "${MLFLOW_BIND_HOST_PORT:-127.0.0.1:5000}:5000"
    volumes:
      - mlflow_data:/mlruns
    networks: [data]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_ADMIN_USERNAME: ${MLFLOW_ADMIN_USERNAME:-mlflow_admin}
      MLFLOW_ADMIN_PASSWORD: ${MLFLOW_ADMIN_PASSWORD:?ERROR — MLFLOW_ADMIN_PASSWORD must be set (IN-009 v113)}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    healthcheck:
      # /health does NOT require auth.
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits: { memory: 1g, cpus: '1' }
        reservations: { memory: 256m }
    logging: *default-logging
    restart: unless-stopped

  # ===========================================================================
  # pg-backup (IN-005) — daily pg_dump sidecar to the `backups` volume.
  # Mirrors the root docker-compose.yml pg-backup service. The cron schedule
  # is daily at 02:00 UTC (configurable via PG_BACKUP_SCHEDULE env var).
  # ===========================================================================
  pg-backup:
    image: postgres:16-alpine
    init: true
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PG_BACKUP_SCHEDULE: ${PG_BACKUP_SCHEDULE:-0 2 * * *}
      PG_BACKUP_RETENTION_DAYS: ${PG_BACKUP_RETENTION_DAYS:-7}
    volumes:
      - backups:/backups
      - ../observability/backup.sh:/backup.sh:ro
    networks: [data]
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/backup.sh"]
    deploy:
      resources:
        limits: { memory: 512m, cpus: '0.5' }
        reservations: { memory: 128m }
    logging: *default-logging
    restart: unless-stopped
