      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install core deps
        run: |
          python -m pip install --upgrade pip
          # Phase 3/4 only need torch + pandas + numpy + sklearn to PARSE.
          # Full deps are installed in the test job below; here we just
          # need the import-time deps for compileall to succeed.
          pip install -q \
            "torch>=2.0" \
            "pandas>=2.1.4" \
            "numpy>=1.26.3" \
            "scikit-learn>=1.3" \
            "gymnasium>=0.29" \
            "pyyaml>=6.0"
