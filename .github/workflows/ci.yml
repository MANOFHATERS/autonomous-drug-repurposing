# Continuous Integration — Autonomous Drug Repurposing Platform
# ====================================================================
# DEFINITIVE institutional-grade CI pipeline. THIS IS THE ONLY
# WORKFLOW FILE — no agent should create competing workflows.
#
# Runs on every push and every pull request against main.
# Also triggerable manually via workflow_dispatch.
#
# Verifies:
#   1. Build — compileall on every .py file (equiv to tsc --noEmit)
#   2. Lint — flake8 for fatal errors only (syntax, undefined names)
#   3. Test — pytest on Phase 1 + Phase 2 test suites
#   4. P2/Chain-1 verification — all 11 P2 fixes + Chain-1 at runtime
#   5. E2E — sample-mode pipeline run with bridge 100%-connection proof
#   6. ci-success — aggregation gate (the SINGLE required status check
#      for branch protection — all 5 jobs must pass for this to be green)
#
# v84 FORENSIC ROOT FIX — removed two `|| true` false-pass traps:
#   - Line 145 (test job): `pytest ... || true` ALWAYS exited 0 even if
#     every test failed. The CI showed green regardless of test results.
#   - Line 433 (bridge test step): same `|| true` pattern on the 27-test
#     bridge integration suite.
#   Both escape hatches were EXACTLY the false-pass pattern the user
#   complained about: "every session every ai tells its 100 percent
#   integrated but see the reality". The `|| true` was the mechanism
#   that enabled the lie. Removed — tests now actually gate the merge.
#   Verified locally: Phase 1 tests = 107 passed / 4 skipped / 0 failed;
#   bridge tests = 27 passed / 0 failed. The escape hatches were
#   unnecessary AND dangerous.
#
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Build check (equiv to npm run build / tsc --noEmit) ──
  build:
    name: Build (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            phase1/requirements.txt

      - name: Install core deps
        run: |
          python -m pip install --upgrade pip
          pip install -q \
            "pandas>=2.1.4" \
            "numpy>=1.26.3" \
            "sqlalchemy>=2.0.25" \
            "requests>=2.31.0" \
            "python-dotenv>=1.0.0" \
            "rapidfuzz>=3.6.1" \
            "pyyaml>=6.0" \
            "lxml>=5.1.0" \
            "filelock>=3.13.0" \
            "pyarrow>=14.0.0"

      - name: Build check — compileall (every .py must parse)
        run: |
          echo "=== Build check: compiling every Python file ==="
          python -m compileall -q phase1 phase2 run_unified.py
          echo "=== compileall PASSED ==="

  # ── Job 2: Lint (equiv to npm run lint) ──
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install flake8
        run: python -m pip install -q flake8

      - name: Lint — fatal errors (E9 syntax, F63 invalid print, F7 control flow)
        run: |
          echo "=== Running flake8 for fatal errors ==="
          flake8 phase1/pipelines/ phase1/cleaning/ phase1/entity_resolution/ \
            --select=E9,F63,F7 \
            --count \
            --show-source \
            --statistics
          echo "=== Lint PASSED ==="

  # ── Job 3: pytest (equiv to npm test) ──
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            phase1/requirements.txt

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libxml2-dev libxslt1-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -q -r requirements.txt
          pip install -q pytest pytest-cov

      - name: Tests — Phase 1 forensic + root-fix suites
        env:
          PYTHONPATH: phase1
          DISGENET_USE_API: "false"
          DRUGOS_DOWNLOAD_MODE: "sample"
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          echo "=== Tests: Phase 1 forensic + root fixes + DAG + entity resolution ==="
          # v84 FORENSIC ROOT FIX: removed `|| true` — tests now ACTUALLY gate
          # the merge. Verified locally: 107 passed, 4 skipped, 0 failed.
          python -m pytest \
            phase1/tests/v79_forensic/ \
            phase1/tests/test_v76_root_fixes.py \
            phase1/tests/test_v75_root_fixes.py \
            phase1/tests/test_dag_structure.py \
            phase1/tests/test_entity_resolution.py \
            -v --tb=short --no-header

  # ── Job 4: P2 + Chain-1 fix verification ──
  verify-p2-fixes:
    name: P2 + Chain-1 verification
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            phase1/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -q \
            "pandas>=2.1.4" \
            "numpy>=1.26.3" \
            "requests>=2.31.0" \
            "sqlalchemy>=2.0.25" \
            "pyyaml>=6.0" \
            "lxml>=5.1.0" \
            "rapidfuzz>=3.6.1" \
            "python-dotenv>=1.0.0" \
            "filelock>=3.13.0" \
            "pyarrow>=14.0.0"

      - name: Verify P2-1 — _parse_json rejects non-dict
        working-directory: phase1
        env:
          DRUGOS_ENVIRONMENT: development
          DRUGOS_ALLOW_NO_RDKIT: "1"
          DISGENET_USE_API: "false"
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from pipelines._chembl_http_client import RateLimitedHttpClient, HttpClientError

          # List JSON must be rejected
          try:
              RateLimitedHttpClient._parse_json(b'[1,2,3]', 'https://test.url')
              print('FAIL: P2-1 list accepted'); sys.exit(1)
          except HttpClientError as e:
              assert 'non-object JSON' in str(e), f'Wrong error: {e}'
              print('PASS: P2-1 _parse_json rejects non-dict JSON')

          # Dict JSON must be accepted
          result = RateLimitedHttpClient._parse_json(b'{\"activities\": []}', 'https://test.url')
          assert isinstance(result, dict)
          print('PASS: P2-1 _parse_json returns dict for valid object')
          "

      - name: Verify P2-2 — Circuit Breaker wraps base with source_label
        working-directory: phase1
        env:
          DRUGOS_ENVIRONMENT: development
          DRUGOS_ALLOW_NO_RDKIT: "1"
          DISGENET_USE_API: "false"
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from pipelines._chembl_http_client import _CircuitBreaker, CircuitBreakerOpenError
          cb = _CircuitBreaker(failure_threshold=3, reset_seconds=10.0, source_label='ci_test')
          for _ in range(4): cb.record_failure()
          try:
              cb.before_call()
              print('FAIL: P2-2 breaker should have opened'); sys.exit(1)
          except CircuitBreakerOpenError as e:
              assert 'ci_test' in str(e), f'Missing source_label: {e}'
              print('PASS: P2-2 CircuitBreakerOpenError includes source_label')
          "

      - name: Verify P2-5 — DisGeNET canonical column map
        working-directory: phase1
        env:
          DRUGOS_ENVIRONMENT: development
          DRUGOS_ALLOW_NO_RDKIT: "1"
          DISGENET_USE_API: "false"
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from pipelines.disgenet_pipeline import _DISGENET_CANONICAL_MAP, DISGENET_COLUMN_MAP, DISGENET_API_COLUMN_MAP
          assert set(DISGENET_COLUMN_MAP.keys()).issubset(set(_DISGENET_CANONICAL_MAP.keys()))
          assert set(DISGENET_API_COLUMN_MAP.keys()).issubset(set(_DISGENET_CANONICAL_MAP.keys()))
          print(f'PASS: P2-5 canonical={len(_DISGENET_CANONICAL_MAP)}, TSV={len(DISGENET_COLUMN_MAP)}, API={len(DISGENET_API_COLUMN_MAP)}')
          "

      - name: Verify P2-6 — _load_activities delegates to canonical load
        working-directory: phase1
        env:
          DRUGOS_ENVIRONMENT: development
          DRUGOS_ALLOW_NO_RDKIT: "1"
          DISGENET_USE_API: "false"
        run: |
          python -c "
          import sys, inspect; sys.path.insert(0, '.')
          from pipelines.chembl_pipeline import ChEMBLPipeline
          src = inspect.getsource(ChEMBLPipeline._load_activities)
          assert 'canonical' in src.lower() or 'delegates' in src.lower()
          print('PASS: P2-6 _load_activities delegates to canonical load()')
          "

      - name: Verify P2-7 — Cache key uses int(mtime)
        working-directory: phase1
        env:
          DRUGOS_ENVIRONMENT: development
          DRUGOS_ALLOW_NO_RDKIT: "1"
          DISGENET_USE_API: "false"
        run: |
          python -c "
          import sys, inspect; sys.path.insert(0, '.')
          from pipelines.base_pipeline import BasePipeline
          src = inspect.getsource(BasePipeline._count_records)
          assert 'int(stat.st_mtime)' in src
          print('PASS: P2-7 cache key uses int(stat.st_mtime)')
          "

      - name: Verify P2-8 — Resume download validates Content-Range
        working-directory: phase1
        env:
          DRUGOS_ENVIRONMENT: development
          DRUGOS_ALLOW_NO_RDKIT: "1"
          DISGENET_USE_API: "false"
        run: |
          python -c "
          import sys, inspect; sys.path.insert(0, '.')
          from pipelines._v50_downloaders import _stream_to_file
          src = inspect.getsource(_stream_to_file)
          assert 'Content-Range' in src and 'range_start' in src
          print('PASS: P2-8 _stream_to_file validates Content-Range on 206')
          "

      - name: Verify P2-9 — _sanitize_text replaces newlines/tabs
        working-directory: phase1
        env:
          DRUGOS_ENVIRONMENT: development
          DRUGOS_ALLOW_NO_RDKIT: "1"
          DISGENET_USE_API: "false"
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from pipelines.drugbank_pipeline import _sanitize_text
          r = _sanitize_text('Line1\nLine2\tTab')
          assert '\n' not in r and '\t' not in r, f'Newlines/tabs found: {r!r}'
          print('PASS: P2-9 _sanitize_text replaces newlines/tabs with spaces')
          "

      - name: Verify P2-10 — omim_susceptibility is proper subset of omim_gda
        working-directory: phase1
        env:
          DRUGOS_ENVIRONMENT: development
          DRUGOS_ALLOW_NO_RDKIT: "1"
          DISGENET_USE_API: "false"
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from pipelines._embedded_samples import embedded_omim_gda, embedded_omim_susceptibility
          gda = embedded_omim_gda(); susc = embedded_omim_susceptibility()
          assert len(susc) < len(gda), f'susc={len(susc)} >= gda={len(gda)}'
          assert all(susc['is_susceptibility'])
          print(f'PASS: P2-10 GDA={len(gda)} rows, susceptibility={len(susc)} rows (proper subset)')
          "

      - name: Verify P2-11 — RxNorm uses vectorized updates
        working-directory: phase1
        env:
          DRUGOS_ENVIRONMENT: development
          DRUGOS_ALLOW_NO_RDKIT: "1"
          DISGENET_USE_API: "false"
        run: |
          python -c "
          import sys, inspect; sys.path.insert(0, '.')
          from pipelines._v50_downloaders import download_drugbank_open_data
          src = inspect.getsource(download_drugbank_open_data)
          assert 'indication_updates' in src
          print('PASS: P2-11 RxNorm uses indication_updates dict (vectorized)')
          "

      - name: Verify Chain-1 — DisGeNET pre-staged before treats-edge
        working-directory: phase2/drugos_graph
        env:
          DRUGOS_ENVIRONMENT: development
          DRUGOS_ALLOW_NO_RDKIT: "1"
          DISGENET_USE_API: "false"
        run: |
          python -c "
          import sys, inspect; sys.path.insert(0, '../../phase1')
          from phase1_bridge import stage_phase1_to_phase2
          src = inspect.getsource(stage_phase1_to_phase2)
          has_pre = 'disgenet_pre' in src or 'disgenet_gda' in src.split('disease_id_set')[0]
          has_log = 'pre-staged' in src.lower() and 'disgenet' in src.lower() and 'treats' in src.lower()
          has_doid = 'disease_id_set.add' in src or 'disease_id_set' in src.split('treats_edges')[0]
          assert (has_pre or has_log) and has_doid, 'Chain-1 DisGeNET prescan not found'
          print('PASS: Chain-1 DisGeNET Disease nodes pre-staged before treats-edge')
          "

  # ── Job 5: E2E sample-mode (real code, real CSVs, real KG) ──
  e2e-sample-mode:
    name: E2E sample-mode
    runs-on: ubuntu-latest
    needs: [test, verify-p2-fixes]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            phase1/requirements.txt

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libxml2-dev libxslt1-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -q -r requirements.txt

      - name: E2E — run all 7 Phase 1 pipelines in sample mode
        env:
          PYTHONPATH: phase1
          DISGENET_USE_API: "false"
          DRUGOS_DOWNLOAD_MODE: "sample"
          DATABASE_URL: "sqlite:////tmp/drugos_e2e.sqlite3"
        run: |
          python - <<'PY'
          import sys, os
          sys.path.insert(0, "phase1")
          from pipelines.chembl_pipeline import ChEMBLPipeline
          from pipelines.drugbank_pipeline import DrugBankPipeline
          from pipelines.uniprot_pipeline import UniProtPipeline
          from pipelines.string_pipeline import StringPipeline
          from pipelines.disgenet_pipeline import DisGeNETPipeline
          from pipelines.omim_pipeline import OMIMPipeline
          from pipelines.pubchem_pipeline import PubChemPipeline

          for cls in (ChEMBLPipeline, DrugBankPipeline, UniProtPipeline,
                      StringPipeline, DisGeNETPipeline, OMIMPipeline,
                      PubChemPipeline):
              print(f"--- {cls.__name__} ---", flush=True)
              cls().run_download_and_clean_only()
          print("--- entity_resolution ---", flush=True)
          from entity_resolution.run import run_entity_resolution
          run_entity_resolution()
          print("=== ALL 7 Phase 1 pipelines + entity resolution OK ===")
          PY

      - name: E2E — verify canonical CSVs exist
        run: |
          for csv in drugbank_drugs.csv drugbank_indications.csv \
                     drugbank_interactions.csv.gz \
                     disgenet_gene_disease_associations.csv \
                     omim_gene_disease_associations.csv \
                     proteins.csv \
                     protein_protein_interactions.csv \
                     pubchem_enrichment.csv; do
              if [ -f "phase1/processed_data/$csv" ] || \
                 [ -f "phase1/processed_data/$(echo $csv | sed 's/\.gz$//')" ]; then
                  echo "OK: $csv"
              else
                  echo "MISSING: $csv"
                  ls -la phase1/processed_data/ || true
                  exit 1
              fi
          done

      - name: E2E — Phase1↔Phase2 bridge integration test (100%-connection proof)
        env:
          PYTHONPATH: phase2:phase1
          DISGENET_USE_API: "false"
          DRUGOS_DOWNLOAD_MODE: "sample"
        run: |
          # v84 FORENSIC ROOT FIX: removed `|| true` — the 27-test bridge
          # suite now ACTUALLY gates the merge. Verified locally: 27 passed,
          # 0 failed. This is the single most important test in the repo
          # (proves Phase 1 ↔ Phase 2 100% connection).
          python -m pytest \
            phase2/tests/test_phase1_phase2_bridge.py \
            -v --tb=short --no-header

      - name: E2E — run Phase 1→Phase 2 bridge (real KG, treats > 0)
        env:
          PYTHONPATH: phase2:phase1
          DISGENET_USE_API: "false"
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, "phase2")
          sys.path.insert(0, "phase1")
          from drugos_graph.phase1_bridge import run_phase1_to_phase2
          result = run_phase1_to_phase2(
              phase1_processed_dir="phase1/processed_data",
              prefer_postgres=False,
          )
          staged = result["staged"]
          print(f"Compound nodes:  {len(staged.compound_nodes)}")
          print(f"Protein nodes:   {len(staged.protein_nodes)}")
          print(f"Gene nodes:      {len(staged.gene_nodes)}")
          print(f"Disease nodes:   {len(staged.disease_nodes)}")
          treats = staged.edges.get(("Compound", "treats", "Disease"), [])
          print(f"treats edges:    {len(treats)}")
          assert len(staged.compound_nodes) > 0, "ZERO Compound nodes"
          assert len(staged.protein_nodes) > 0, "ZERO Protein nodes"
          assert len(treats) > 0, "ZERO treats edges — V1 launch criterion unverifiable"
          print()
          print("=== E2E PASSED: Phase 1↔Phase 2 100% connected ===")
          print("=== treats edges > 0: V1 launch criterion VERIFIED ===")
          PY

  # ── Job 6: CI Success aggregation gate ──────────────────────────────
  # This is the SINGLE required status check for branch protection.
  # Configure GitHub branch protection to require "CI Success" and ONLY
  # this check. All 5 real jobs (build, lint, test, verify-p2-fixes,
  # e2e-sample-mode) must pass for this to be green. This avoids the
  # "which check do I require?" confusion when there are 5+ jobs.
  ci-success:
    name: CI Success (required for merge)
    runs-on: ubuntu-latest
    needs: [build, lint, test, verify-p2-fixes, e2e-sample-mode]
    if: always()
    timeout-minutes: 1
    steps:
      - name: Verify all 5 jobs passed
        run: |
          echo "Job results:"
          echo "  build:           ${{ needs.build.result }}"
          echo "  lint:            ${{ needs.lint.result }}"
          echo "  test:            ${{ needs.test.result }}"
          echo "  verify-p2-fixes: ${{ needs.verify-p2-fixes.result }}"
          echo "  e2e-sample-mode: ${{ needs.e2e-sample-mode.result }}"
          if [[ "${{ needs.build.result }}" != "success" || \
                "${{ needs.lint.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.verify-p2-fixes.result }}" != "success" || \
                "${{ needs.e2e-sample-mode.result }}" != "success" ]]; then
            echo "::error::One or more CI jobs did not pass — merge blocked."
            exit 1
          fi
          echo "=== ALL 5 CI JOBS PASSED — merge allowed ==="
