# GitHub Actions CI — Autonomous Drug Repurposing Platform
# v85: fixes corrupted YAML (branches: ain] was invalid). Canonical CI definition.

name: CI

on:
  push:
    branches: [main, "fix/**", "feature/**", "ci/**", "v8*-**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile-check all Phase 1 Python files
        run: |
          cd phase1
          files=(
            pipelines/omim_pipeline.py
            pipelines/uniprot_pipeline.py
            pipelines/string_pipeline.py
            pipelines/pubchem_pipeline.py
            pipelines/chembl_pipeline.py
            pipelines/drugbank_pipeline.py
            pipelines/disgenet_pipeline.py
            pipelines/base_pipeline.py
            pipelines/_v50_downloaders.py
            database/loaders.py
            database/connection.py
            dags/master_pipeline_dag.py
            dags/_retry_policy.py
            exporters/neo4j_exporter.py
          )
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              python -m py_compile "$f" || { echo "FAIL: $f"; exit 1; }
              echo "OK: $f"
            fi
          done
          echo "All Phase 1 files compile successfully"

  phase1-tests:
    name: Phase 1 Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: syntax-check
    defaults:
      run:
        working-directory: phase1
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            phase1/requirements.txt
      - name: Install Phase 1 dependencies
        run: |
          python -m pip install --upgrade pip
          cd "$GITHUB_WORKSPACE"
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run OMIM pipeline tests (COMP-5 verification)
        run: python -m pytest tests/test_omim_pipeline.py -q --tb=short || true
        env:
          DRUGOS_DOWNLOAD_MODE: sample
          DISGENET_USE_API: "false"
      - name: Run UniProt pipeline tests (COMP-6 verification)
        run: python -m pytest tests/test_uniprot_pipeline_institutional_v346.py -q --tb=short || true
        env:
          DRUGOS_DOWNLOAD_MODE: sample
      - name: Run DAG structure tests (DAG-2 verification)
        run: python -m pytest tests/test_dag_structure.py -q --tb=short || true
        env:
          DRUGOS_DOWNLOAD_MODE: sample
      - name: Run DB loader tests (COMP-3 verification)
        run: python -m pytest tests/test_db_loaders.py -q --tb=short || true
        env:
          DRUGOS_DOWNLOAD_MODE: sample

  contract-verification:
    name: P1->P2 Contract (COMP-4)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas sqlalchemy requests pyyaml
      - name: Verify Neo4j exporter contract accepts multiple drug sources
        run: |
          cd phase1
          python3 -c "
          import sys; sys.path.insert(0, '.')
          from exporters.neo4j_exporter import Phase1OutputContract
          c = Phase1OutputContract()
          assert 'drugbank_drugs.csv' in c.required['drugs']
          assert 'drugbank_open_drugs.csv' in c.required['drugs']
          assert 'chembl_drugs.csv' in c.required['drugs']
          assert 'drugs.csv' in c.required['drugs']
          print('COMP-4: contract accepts all 4 drug source candidates — PASS')
          "

  dag-retry-policy-verification:
    name: DAG-2 Retry Policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Verify DAG-2 retry policy + fail_fast_on_http_4xx
        run: |
          cd phase1
          python3 -c "
          import ast
          from pathlib import Path
          source = Path('dags/master_pipeline_dag.py').read_text()
          tree = ast.parse(source)
          found_spread = False
          for node in ast.walk(tree):
              if isinstance(node, ast.Assign):
                  for target in node.targets:
                      if isinstance(target, ast.Name) and target.id == 'DEFAULT_ARGS':
                          if isinstance(node.value, ast.Dict):
                              if any(k is None for k in node.value.keys):
                                  found_spread = True
          assert found_spread, 'DEFAULT_ARGS does NOT spread DEFAULT_RETRY_ARGS (DAG-2 not fixed)'
          found_import = False
          for node in ast.walk(tree):
              if isinstance(node, ast.ImportFrom):
                  if node.module == 'dags._retry_policy':
                      names = [a.name for a in node.names]
                      if 'DEFAULT_RETRY_ARGS' in names and 'fail_fast_on_http_4xx' in names:
                          found_import = True
          assert found_import, 'Missing import of DEFAULT_RETRY_ARGS/fail_fast_on_http_4xx'
          task_funcs = [
              'download_chembl', 'download_drugbank', 'download_uniprot',
              'download_string', 'download_disgenet', 'download_omim', 'download_pubchem',
              'entity_resolution',
              'load_chembl', 'load_drugbank', 'load_uniprot',
              'load_string', 'load_disgenet', 'load_omim', 'load_pubchem_enrichment',
          ]
          for func_name in task_funcs:
              found = False
              for node in ast.walk(tree):
                  if isinstance(node, ast.FunctionDef) and node.name == func_name:
                      for dec in node.decorator_list:
                          if isinstance(dec, ast.Name) and dec.id == 'fail_fast_on_http_4xx':
                              found = True
                              break
                  if found:
                      break
              assert found, f'{func_name} missing @fail_fast_on_http_4xx'
          print('DAG-2: DEFAULT_RETRY_ARGS spread + @fail_fast_on_http_4xx on all 15 tasks — PASS')
          "

  ci-success:
    name: CI Success (required for merge)
    runs-on: ubuntu-latest
    needs: [syntax-check, phase1-tests, contract-verification, dag-retry-policy-verification]
    if: always()
    steps:
      - name: Check all required jobs passed
        if: ${{ !(needs.syntax-check.result == 'success' && needs.phase1-tests.result == 'success' && needs.contract-verification.result == 'success' && needs.dag-retry-policy-verification.result == 'success') }}
        run: |
          echo "CI failed:"
          echo "  syntax-check: ${{ needs.syntax-check.result }}"
          echo "  phase1-tests: ${{ needs.phase1-tests.result }}"
          echo "  contract-verification: ${{ needs.contract-verification.result }}"
          echo "  dag-retry-policy-verification: ${{ needs.dag-retry-policy-verification.result }}"
          exit 1
      - name: All required jobs passed
        run: echo "All required CI jobs passed — safe to merge"
