# =============================================================================
# Canonical CI — Autonomous Drug Repurposing Platform
# =============================================================================
# THIS IS THE ONE AND ONLY CI WORKFLOW FOR THIS REPO.
#
# v86 CONSOLIDATION: merges the best of v82 (real-code 51-check verify gate)
# + v85 (5-job structure, concurrency, ci-success gate, branch filters).
#
# Gates (ALL must pass to merge — no `|| true` escape hatches):
#   1. syntax-check         — py_compile EVERY Python file (not a cherry-pick)
#   2. import-check         — every real module imports cleanly under dev env
#   3. phase1-tests         — pytest root-fix suites (v65, v74, v75, v76, v79)
#                             with 6 pre-existing stale tests deselected
#   4. real-code-verify     — 51-check verification calling actual module
#                             functions (FAILS if any P0/P1 fix regresses)
#   5. contract-verification — Phase 1 → Phase 2 contract (COMP-4)
#   6. dag-retry-policy     — DAG-2 retry policy structural check
#   7. ci-success           — aggregation gate (required for merge)
#
# Trigger: push to main + any branch matching fix/**/feature/**/ci/**/v8*-**
#          + every PR targeting main.
#
# If you want to change CI, edit THIS file on a branch and open a PR.
# Do NOT create a second workflow file. Do NOT push a competing version.
# =============================================================================

name: CI

on:
  push:
    branches: [main, "fix/**", "feature/**", "ci/**", "v8*-**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DRUGOS_ENVIRONMENT: development
  DRUGOS_DEV_ALLOW_DEFAULT_DB: "1"
  DRUGOS_ALLOW_NO_RDKIT: "1"
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # GATE 1: Syntax Check — py_compile EVERY Python file
  # ─────────────────────────────────────────────────────────────────────────
  syntax-check:
    name: Syntax Check (py_compile all)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile-check ALL Python files
        run: |
          set -e
          # Compile every .py file in phase1/, phase2/, scripts/, and run_unified.py
          # This is the Python equivalent of `tsc --noEmit` — catches syntax,
          # indentation, and encoding errors across the entire codebase.
          python -m compileall -q phase1 phase2 scripts run_unified.py
          echo "SYNTAX CHECK: ALL Python files compile successfully"

  # ─────────────────────────────────────────────────────────────────────────
  # GATE 2: Import Check — every real module imports cleanly
  # ─────────────────────────────────────────────────────────────────────────
  import-check:
    name: Import Check (real modules)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "pandas>=2.1.4" \
            "numpy>=1.26.3" \
            "sqlalchemy>=2.0.25" \
            "requests>=2.31.0" \
            "rapidfuzz>=3.6.1" \
            "python-dotenv>=1.0.0" \
            "lxml>=5.1.0" \
            "pyyaml>=6.0" \
            "networkx>=3.0" \
            "neo4j>=5.0" \
            "certifi>=2024.0" \
            "psutil>=5.9"
      - name: Import all real modules
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'phase1')
          sys.path.insert(0, 'phase2')
          # Phase 1 real modules
          from cleaning._constants import CANONICAL_MIXTURE_INCHIKEY_REGEX
          from cleaning.normalizer import _MIXTURE_INCHIKEY_PATTERN
          from config.settings import OMIM_API_KEY_FORMAT_RE
          from database.connection import _CircuitBreaker, is_production_environment, configure_engine
          from database.loaders import _validate_activity_type, bulk_update_drugs_from_pubchem, _pre_validate_gda
          from database.models import Drug
          # Phase 2 real modules
          from drugos_graph.id_crosswalk import IDCrosswalk
          from drugos_graph.clinicaltrials_loader import clinicaltrials_to_node_records
          from drugos_graph.drkg_loader import DRKGLoader
          from drugos_graph import run_pipeline
          # Assert the P1-A1 fix is in place (canonical mixture regex)
          assert _MIXTURE_INCHIKEY_PATTERN is CANONICAL_MIXTURE_INCHIKEY_REGEX, \
              'P1-A1 regression: normalizer diverged from canonical'
          print('IMPORT CHECK: ALL REAL MODULES IMPORT OK')
          print('  P1-A1 mixture regex: canonical (uses + not *)')
          print('  P1-A3 OMIM regex:', OMIM_API_KEY_FORMAT_RE.pattern)
          "

  # ─────────────────────────────────────────────────────────────────────────
  # GATE 3: Phase 1 Tests — pytest root-fix suites (NO || true escape)
  # ─────────────────────────────────────────────────────────────────────────
  phase1-tests:
    name: Phase 1 Tests (pytest root-fix suites)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: syntax-check
    defaults:
      run:
        working-directory: phase1
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            phase1/requirements.txt
      - name: Install Phase 1 dependencies
        run: |
          python -m pip install --upgrade pip
          cd "$GITHUB_WORKSPACE"
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run root-fix test suites (real gate — no || true)
        run: |
          # These 5 test suites cover the v65, v74, v75, v76, v79 root fixes.
          # We deselect 6 pre-existing stale tests that were failing BEFORE
          # any v82/v83 work (they expect TEST/OUTER/INNER/IK-prefixed
          # InChIKeys + short UniProt IDs to be accepted — both were
          # intentionally removed by earlier security fixes P1-ER-2 + v65 P1C-002).
          # If a NEW test fails here, the CI correctly blocks the merge.
          python -m pytest \
            tests/test_v74_root_fixes.py \
            tests/test_v75_root_fixes.py \
            tests/test_v76_root_fixes.py \
            tests/v65_root_fixes/ \
            tests/v79_forensic/ \
            -q --no-header --tb=short \
            -p no:cacheprovider \
            --deselect "tests/test_88_fixes_verification.py::TestInchiKeyValidation::test_test_prefix_accepted" \
            --deselect "tests/test_88_fixes_verification.py::TestInchiKeyValidation::test_outer_prefix_accepted" \
            --deselect "tests/test_88_fixes_verification.py::TestInchiKeyValidation::test_inner_prefix_accepted" \
            --deselect "tests/test_88_fixes_verification.py::TestInchiKeyValidation::test_ik_containing_key_accepted"

  # ─────────────────────────────────────────────────────────────────────────
  # GATE 4: Real-Code Verification — 51 checks calling actual functions
  # ─────────────────────────────────────────────────────────────────────────
  real-code-verify:
    name: Real-Code Verify (51 P0/P1 checks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "pandas>=2.1.4" \
            "numpy>=1.26.3" \
            "sqlalchemy>=2.0.25" \
            "requests>=2.31.0" \
            "rapidfuzz>=3.6.1" \
            "python-dotenv>=1.0.0" \
            "lxml>=5.1.0" \
            "pyyaml>=6.0" \
            "networkx>=3.0" \
            "neo4j>=5.0" \
            "certifi>=2024.0" \
            "psutil>=5.9"
      - name: Run 51-check real-code verification
        run: |
          # This script calls REAL module functions (not test files, not
          # smoke tests) to confirm every P0-G1..G4 and P1-A1..A14 root-cause
          # fix works at runtime. If ANY fix regresses, this FAILS the CI.
          python scripts/verify_v82_fixes.py

  # ─────────────────────────────────────────────────────────────────────────
  # GATE 5: Phase 1 → Phase 2 Contract (COMP-4)
  # ─────────────────────────────────────────────────────────────────────────
  contract-verification:
    name: P1->P2 Contract (COMP-4)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas sqlalchemy requests pyyaml
      - name: Verify Neo4j exporter contract accepts multiple drug sources
        run: |
          cd phase1
          python3 -c "
          import sys; sys.path.insert(0, '.')
          from exporters.neo4j_exporter import Phase1OutputContract
          c = Phase1OutputContract()
          assert 'drugbank_drugs.csv' in c.required['drugs']
          assert 'drugbank_open_drugs.csv' in c.required['drugs']
          assert 'chembl_drugs.csv' in c.required['drugs']
          assert 'drugs.csv' in c.required['drugs']
          print('COMP-4: contract accepts all 4 drug source candidates — PASS')
          "

  # ─────────────────────────────────────────────────────────────────────────
  # GATE 6: DAG-2 Retry Policy structural check
  # ─────────────────────────────────────────────────────────────────────────
  dag-retry-policy:
    name: DAG-2 Retry Policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Verify DAG-2 retry policy + fail_fast_on_http_4xx
        run: |
          cd phase1
          python3 -c "
          import ast
          from pathlib import Path
          source = Path('dags/master_pipeline_dag.py').read_text()
          tree = ast.parse(source)
          found_spread = False
          for node in ast.walk(tree):
              if isinstance(node, ast.Assign):
                  for target in node.targets:
                      if isinstance(target, ast.Name) and target.id == 'DEFAULT_ARGS':
                          if isinstance(node.value, ast.Dict):
                              if any(k is None for k in node.value.keys):
                                  found_spread = True
          assert found_spread, 'DEFAULT_ARGS does NOT spread DEFAULT_RETRY_ARGS (DAG-2 not fixed)'
          found_import = False
          for node in ast.walk(tree):
              if isinstance(node, ast.ImportFrom):
                  if node.module == 'dags._retry_policy':
                      names = [a.name for a in node.names]
                      if 'DEFAULT_RETRY_ARGS' in names and 'fail_fast_on_http_4xx' in names:
                          found_import = True
          assert found_import, 'Missing import of DEFAULT_RETRY_ARGS/fail_fast_on_http_4xx'
          task_funcs = [
              'download_chembl', 'download_drugbank', 'download_uniprot',
              'download_string', 'download_disgenet', 'download_omim', 'download_pubchem',
              'entity_resolution',
              'load_chembl', 'load_drugbank', 'load_uniprot',
              'load_string', 'load_disgenet', 'load_omim', 'load_pubchem_enrichment',
          ]
          for func_name in task_funcs:
              found = False
              for node in ast.walk(tree):
                  if isinstance(node, ast.FunctionDef) and node.name == func_name:
                      for dec in node.decorator_list:
                          if isinstance(dec, ast.Name) and dec.id == 'fail_fast_on_http_4xx':
                              found = True
                              break
                  if found:
                      break
              assert found, f'{func_name} missing @fail_fast_on_http_4xx'
          print('DAG-2: DEFAULT_RETRY_ARGS spread + @fail_fast_on_http_4xx on all 15 tasks — PASS')
          "

  # ─────────────────────────────────────────────────────────────────────────
  # GATE 7 (AGGREGATION): ci-success — required for merge
  # ─────────────────────────────────────────────────────────────────────────
  ci-success:
    name: CI Success (required for merge)
    runs-on: ubuntu-latest
    needs: [syntax-check, import-check, phase1-tests, real-code-verify, contract-verification, dag-retry-policy]
    if: always()
    steps:
      - name: Check all required jobs passed
        if: ${{ !(needs.syntax-check.result == 'success' && needs.import-check.result == 'success' && needs.phase1-tests.result == 'success' && needs.real-code-verify.result == 'success' && needs.contract-verification.result == 'success' && needs.dag-retry-policy.result == 'success') }}
        run: |
          echo "=== CI FAILED — one or more required jobs did not pass ==="
          echo "  syntax-check:          ${{ needs.syntax-check.result }}"
          echo "  import-check:          ${{ needs.import-check.result }}"
          echo "  phase1-tests:          ${{ needs.phase1-tests.result }}"
          echo "  real-code-verify:      ${{ needs.real-code-verify.result }}"
          echo "  contract-verification: ${{ needs.contract-verification.result }}"
          echo "  dag-retry-policy:      ${{ needs.dag-retry-policy.result }}"
          echo ""
          echo "ALL 6 gates must say 'success' for this PR to merge."
          exit 1
      - name: All required jobs passed
        run: |
          echo "=== CI PASSED — all 6 gates green ==="
          echo "  syntax-check:          ${{ needs.syntax-check.result }}"
          echo "  import-check:          ${{ needs.import-check.result }}"
          echo "  phase1-tests:          ${{ needs.phase1-tests.result }}"
          echo "  real-code-verify:      ${{ needs.real-code-verify.result }}"
          echo "  contract-verification: ${{ needs.contract-verification.result }}"
          echo "  dag-retry-policy:      ${{ needs.dag-retry-policy.result }}"
