# =============================================================================
# CodeQL workflow — Autonomous Drug Repurposing Platform
# =============================================================================
# v129 TM16 ROOT FIX (Task 16.6 — IN-044/IN-045): CodeQL is GitHub's
# semantic code-analysis engine. It builds a queryable database of the
# codebase + runs thousands of security queries from GitHub's CodeQL
# query suites. Catches:
#   * SQL injection (Cypher injection is caught by a separate custom
#     query in tests/test_cypher_injection.py — CodeQL does not yet
#     ship a Cypher query suite).
#   * Path traversal in file operations.
#   * Hardcoded credentials (high-entropy string detection).
#   * Unsafe deserialization (pickle, yaml.load without SafeLoader).
#   * SSRF (server-side request forgery) in HTTP client code.
#   * XSS in React/Next.js (via the javascript-typescript analysis).
#
# This workflow runs on every push to main + every PR to main, AND on
# a weekly schedule (Monday 09:00 UTC — same as Dependabot). The weekly
# run catches vulnerabilities introduced by CodeQL query pack updates
# (new queries are added every release).
#
# Two analysis languages:
#   1. python — analyzes phase1/, phase2/, graph_transformer/, rl/,
#      shared/, scripts/, backend/.
#   2. javascript-typescript — analyzes frontend/src/ (Next.js 16 +
#      React 19). CodeQL's JS analyzer also covers .ts/.tsx files.
#
# Both jobs upload results to the repo's Security tab. Findings can be
# dismissed as "false positive" or "used in tests" directly from the UI.
# =============================================================================

name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "**.ts"
      - "**.tsx"
      - "**.js"
      - "**.jsx"
      - ".github/workflows/codeql.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.py"
      - "**.ts"
      - "**.tsx"
      - "**.js"
      - "**.jsx"
      - ".github/workflows/codeql.yml"
  schedule:
    # Weekly Monday 09:00 UTC — catches new CodeQL query pack releases.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required to upload CodeQL results
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-python:
    name: Analyze Python
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            phase1/requirements.txt

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # security-extended adds 200+ extra queries beyond the default
          # security-and-quality suite. Catches more issues but takes
          # longer. Worth it for a pharma patient-safety platform.
          queries: security-extended
          config-file: .github/codeql/python-config.yml

      - name: Autobuild (Python)
        # CodeQL's Python autobuild does NOT need pip install — Python
        # analysis is source-level (no compilation needed). But we
        # install deps anyway so CodeQL can resolve imports and follow
        # cross-module data flow (catches more vulnerabilities).
        run: |
          python -m pip install --upgrade pip
          pip install -q -r requirements.txt || echo "dep install partial — CodeQL will still analyze source"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  analyze-javascript:
    name: Analyze JavaScript/TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
          config-file: .github/codeql/javascript-config.yml

      - name: Autobuild (JavaScript)
        # CodeQL's JS autobuild does NOT need npm install — JS analysis
        # is source-level. But we install deps so the analyzer can
        # resolve @imports and follow cross-module data flow.
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
